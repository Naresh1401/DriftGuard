app = "driftguard"
primary_region = "ord"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile.backend"

[env]
  ENVIRONMENT = "production"
  DATABASE_URL = "sqlite+aiosqlite:///./driftguard.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
