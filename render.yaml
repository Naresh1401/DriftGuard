services:
  # ─── Backend API ───────────────────────────────────
  - type: web
    name: driftguard-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements-deploy.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./driftguard.db
      - key: CORS_ORIGINS
        value: https://driftguard.onrender.com,https://driftguard-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.6

  # ─── Frontend ──────────────────────────────────────
  - type: web
    name: driftguard
    runtime: static
    buildCommand: cd frontend && npm install && VITE_API_URL=https://driftguard-api.onrender.com npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
