services:
  # ─── Backend API ───────────────────────────────────
  - type: web
    name: driftguard-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./driftguard.db
      - key: CORS_ORIGINS
        value: https://driftguard.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.6

  # ─── Frontend ──────────────────────────────────────
  - type: web
    name: driftguard
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://driftguard-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
